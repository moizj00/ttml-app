[build]
# Dockerfile is used for this monorepo (multi-stage build with pnpm + esbuild + vite).
# Railway auto-detects the Dockerfile at root; this setting makes it explicit.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT automatically — the server reads process.env.PORT.
#
# preDeployCommand runs Drizzle migrations before the new container goes live.
# migrate.js exits 0 on success and 1 on failure — a failed migration blocks
# the deploy so a broken schema never reaches production.
# This runs in the built image so dist/migrate.js and drizzle/ are available.
preDeployCommand = "node dist/migrate.js"
startCommand = "node --import ./dist/sentry-init.js dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthCheck]
# GET /health — checks all critical dependencies (DB, Redis, Stripe,
# Resend, Anthropic, Perplexity, R2) via a background probe that runs
# every 30s. Returns 503 when unhealthy. No tRPC overhead.
httpPath = "/health"
intervalSeconds = 30
timeoutSeconds = 10
# Allow extra time for DB connection warm-up and first probe on cold start.
startPeriodSeconds = 45

[deploy.environmentVariables]
# Tell the server it is in production mode so it serves dist/public
# static files instead of starting the Vite dev server.
NODE_ENV = "production"

# Default port — Railway overrides this with its own $PORT at runtime.
PORT = "3000"

# Allowed CORS origins for the production domain.
# Railway preview deployments (*.railway.app / *.up.railway.app) are also
# allowed via the regex check in server/_core/index.ts.
CORS_ALLOWED_ORIGINS = "https://talk-to-my-lawyer.com,https://www.talk-to-my-lawyer.com"

# Base URL used when constructing absolute links in emails and callbacks.
APP_BASE_URL = "https://www.talk-to-my-lawyer.com"

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS — set all of the following in the Railway dashboard (Variables tab).
# Do NOT put secret values in this file.
# ─────────────────────────────────────────────────────────────────────────────
#
# ── Database ─────────────────────────────────────────────────────────────────
# DATABASE_URL            PostgreSQL connection string (e.g. from Railway Postgres plugin
#                         or Supabase → Settings → Database → Connection string).
#                         Also accepted as SUPABASE_DATABASE_URL.
#
# ── Auth ─────────────────────────────────────────────────────────────────────
# JWT_SECRET              Random secret used to sign session cookies (min 32 chars).
#
# ── Supabase ─────────────────────────────────────────────────────────────────
# SUPABASE_URL            Your Supabase project URL  (https://<project>.supabase.co).
#                         Also exposed as VITE_SUPABASE_URL for the client bundle.
# VITE_SUPABASE_URL       Same value — must be set separately so Vite bakes it in
#                         at build time.
# VITE_SUPABASE_ANON_KEY  Supabase anon/public key (safe to expose to the browser).
#                         Also accepted as VITE_SUPABASE_PUBLISHABLE_KEY.
# SUPABASE_SERVICE_ROLE_KEY  Supabase service-role key (server-side only — keep secret).
#
# ── AI / Pipeline ────────────────────────────────────────────────────────────
# OPENAI_API_KEY          OpenAI API key (used for letter generation pipeline).
# ANTHROPIC_API_KEY       Anthropic/Claude API key (used for letter generation pipeline).
# PERPLEXITY_API_KEY      Perplexity API key (used for research step in pipeline).
#
# ── Email (Resend) ───────────────────────────────────────────────────────────
# RESEND_API_KEY          Resend API key for transactional emails.
# RESEND_FROM_EMAIL       Sending address, e.g. noreply@talk-to-my-lawyer.com.
#                         Defaults to noreply@talk-to-my-lawyer.com if not set.
#
# ── Stripe ───────────────────────────────────────────────────────────────────
# STRIPE_SECRET_KEY           Stripe secret key (sk_live_… or sk_test_…).
# STRIPE_WEBHOOK_SECRET       Stripe webhook signing secret (whsec_…).
# VITE_STRIPE_PUBLISHABLE_KEY Stripe publishable key — baked into the client bundle
#                             at build time AND read server-side.
#
# ── Rate Limiting (Upstash Redis) ────────────────────────────────────────────
# UPSTASH_REDIS_REST_URL    Upstash Redis REST endpoint URL.
# UPSTASH_REDIS_REST_TOKEN  Upstash Redis REST token.
#                           If both are omitted the rate limiter falls back to
#                           in-memory state (not suitable for multi-instance deploys).
#
# ── Sentry (Error Monitoring) ────────────────────────────────────────────────
# SENTRY_DSN          Server-side Sentry DSN.
# VITE_SENTRY_DSN     Client-side Sentry DSN — baked into the client bundle at
#                     build time.
# SENTRY_ORG          Sentry organisation slug (used for release uploads).
# SENTRY_PROJECT      Sentry project slug (used for release uploads).
#
# ── n8n Integration (optional) ───────────────────────────────────────────────
# N8N_WEBHOOK_URL      Webhook URL of the n8n pipeline trigger.
# N8N_CALLBACK_SECRET  Shared secret for authenticating n8n → app callbacks.
# N8N_PRIMARY          Set to "true" to use n8n as the primary pipeline executor.
#
# ── Misc / Optional ──────────────────────────────────────────────────────────
# OWNER_OPEN_ID        Supabase user ID that should be auto-promoted to "admin" on
#                      first login (bootstrap only).
# CRON_SECRET          Secret for authenticating HTTP-triggered cron endpoints.
# BUILT_IN_FORGE_API_URL   Internal Forge/Maps API base URL.
# BUILT_IN_FORGE_API_KEY   Internal Forge/Maps API key.
# VITE_FRONTEND_FORGE_API_URL  Client-side Forge API URL (baked in at build time).
# VITE_FRONTEND_FORGE_API_KEY  Client-side Forge API key (baked in at build time).
