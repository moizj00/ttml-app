# railway.toml — Configuration for the TTML app service on Railway.
#
# MULTI-SERVICE DEPLOYMENT MODEL
# ──────────────────────────────
# This repo produces one Docker image with a PROCESS_TYPE entrypoint:
#
#   Service      │ PROCESS_TYPE env var │ Notes
#   ─────────────┼──────────────────────┼──────────────────────
#   ttml-app     │ web (default)        │ Receives HTTP traffic
#   worker       │ worker               │ No domain needed
#   migrate      │ migrate              │ One-shot per deploy
#
# Create three Railway services from the same repo. Set PROCESS_TYPE
# as an env var on each service. Only the web service needs a domain
# and health check.
#
# LEGACY SINGLE-CONTAINER MODE
# ─────────────────────────────
# Set PROCESS_TYPE=all to run migrate + worker + web in one container.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand needed — docker-entrypoint.sh dispatches via PROCESS_TYPE env var
#
# NOTE ON HEALTHCHECKS:
# The web service (PROCESS_TYPE=web) uses Express on /api/health.
# The worker service (PROCESS_TYPE=worker) uses a shim in instrument.ts on /api/health.
# The migrate service (PROCESS_TYPE=migrate) is one-shot and HAS NO healthcheck.
#
# To avoid healthcheck failures on the migrate service, we OMIT healthcheckPath here.
# Configure healthcheckPath = /api/health INDIVIDUALLY in the Railway dashboard 
# for the 'ttml-app' and 'worker' services only.

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthCheckTimeout = 10
healthCheckInterval = 30
serviceName = "ttml-app"
