# docker-compose.prod.yml — Production-oriented orchestration for TTML
#
# Extends docker-compose.yml with production scaling and resource hints.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d app worker
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm migrate
#
# Scale independently:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --scale app=3 --scale worker=2
#
# Note: On Railway, use separate services instead of docker-compose scaling.
# See README.md for Railway-specific configuration.

services:
  migrate:
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  app:
    deploy:
      replicas: 2
      restart_policy:
        condition: unless-stopped
        delay: 5s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    # In production, the platform handles port routing (Railway sets $PORT).
    # Override the ports from the base compose file if needed.
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

  worker:
    deploy:
      replicas: 1
      restart_policy:
        condition: unless-stopped
        delay: 5s
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
