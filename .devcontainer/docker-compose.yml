services:
  # Single dev container with migrate, app, and worker running as separate processes
  app:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    image: ttml-app-dev
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ..:/workspace:cached
    stdin_open: true
    tty: true
