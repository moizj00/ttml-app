name = "ttml-pdf-generator"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Browser Rendering API binding ─────────────────────────────────────────────
# Requires a Workers Paid plan. Provision in the Cloudflare dashboard under
# Workers & Pages → your worker → Settings → Bindings → Browser Rendering.
[browser]
binding = "BROWSER"

# ── Secrets (set via wrangler secret put, NOT in this file) ───────────────────
# PDF_WORKER_SECRET — shared secret token; the main server sends this in the
#                     Authorization: Bearer <token> header with every request.
#                     Set with: wrangler secret put PDF_WORKER_SECRET

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Staging environment ───────────────────────────────────────────────────────
[env.staging]
name = "ttml-pdf-generator-staging"
