name = "ttml-blog-cache"
main = "blog-cache-worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "BLOG_CACHE"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

# Secrets (set via `wrangler secret put`):
#   ORIGIN_URL          — base URL of the origin server
#   INVALIDATION_SECRET — shared secret for cache-invalidation requests
