apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttml-frontend
  namespace: ttml
  labels:
    app: ttml
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ttml
      component: frontend
  template:
    metadata:
      labels:
        app: ttml
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ttml-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
