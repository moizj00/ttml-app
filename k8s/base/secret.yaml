# REPLACE placeholder values with your real base64-encoded secrets.
#
# To encode:
#   Linux/macOS: echo -n "your-secret" | base64
#   PowerShell:  [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-secret"))
#
# Required secrets must match the env vars in .github/copilot-instructions.md.

apiVersion: v1
kind: Secret
metadata:
  name: ttml-secrets
  namespace: ttml
type: Opaque
data:
  # ── Database & Auth (required) ──
  SUPABASE_DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  SUPABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  VITE_SUPABASE_ANON_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # ── AI Pipeline (required for letter generation) ──
  ANTHROPIC_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  PERPLEXITY_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  OPENAI_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # ── Payments & Email (required) ──
  STRIPE_SECRET_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  RESEND_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # ── Object Storage (required for PDF uploads) ──
  R2_ACCOUNT_ID: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  R2_ACCESS_KEY_ID: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  R2_SECRET_ACCESS_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  R2_BUCKET_NAME: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # ── n8n MCP (optional — for n8n pipeline mode) ──
  N8N_CALLBACK_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  N8N_MCP_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  N8N_MCP_BEARER_TOKEN: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # ── Rate Limiting (optional — fail-open if missing) ──
  UPSTASH_REDIS_REST_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  UPSTASH_REDIS_REST_TOKEN: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # ── Monitoring (optional) ──
  SENTRY_DSN: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # ── Auth (optional — falls back to Supabase JWT) ──
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"
