# K8s Worker Deployment — pg-boss pipeline consumer
#
# Uses the same backend image as the app but with a different entrypoint.
# The worker has NO external HTTP traffic — its only health endpoint is
# the shim in instrument.ts (binds to $PORT, responds on /api/health).
#
# Scale independently from the app: fewer replicas, more memory for AI calls.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttml-worker
  namespace: ttml
  labels:
    app: ttml
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ttml
      component: worker
  template:
    metadata:
      labels:
        app: ttml
        component: worker
    spec:
      # Run migrations before the worker starts (same as backend)
      initContainers:
        - name: migrate
          image: ttml-backend:latest
          imagePullPolicy: Never
          command: ["node", "--dns-result-order=ipv4first", "dist/migrate.js"]
          envFrom:
            - configMapRef:
                name: ttml-config
            - secretRef:
                name: ttml-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      containers:
        - name: worker
          image: ttml-backend:latest
          imagePullPolicy: Never
          # Sentry instrumentation + worker health shim (instrument.ts detects worker.js)
          command: ["node", "--dns-result-order=ipv4first", "--import", "./dist/instrument.js", "dist/worker.js"]
          ports:
            - containerPort: 3000
              name: health
          envFrom:
            - configMapRef:
                name: ttml-config
            - secretRef:
                name: ttml-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # Worker health check via the instrument.ts shim
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
