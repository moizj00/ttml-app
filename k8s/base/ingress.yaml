apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ttml-ingress
  namespace: ttml
  annotations:
    # Do NOT use rewrite-target here — /api/* must be passed through
    # to the backend as-is (Express routes expect /api/health, /api/trpc, etc.)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: ttml.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ttml-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ttml-frontend
                port:
                  number: 80
