apiVersion: apps/v1
kind: Deployment
metadata:
  name: ttml-backend
  namespace: ttml
  labels:
    app: ttml
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ttml
      component: backend
  template:
    metadata:
      labels:
        app: ttml
        component: backend
    spec:
      # Run migrations before the backend starts
      initContainers:
        - name: migrate
          image: ttml-backend:latest
          imagePullPolicy: Never
          command: ["node", "--dns-result-order=ipv4first", "dist/migrate.js"]
          envFrom:
            - configMapRef:
                name: ttml-config
            - secretRef:
                name: ttml-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      containers:
        - name: backend
          image: ttml-backend:latest
          imagePullPolicy: Never
          # Sentry instrumentation loaded before the server
          command: ["node", "--dns-result-order=ipv4first", "--import", "./dist/instrument.js", "dist/index.js"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: ttml-config
            - secretRef:
                name: ttml-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
