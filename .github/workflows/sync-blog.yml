name: Sync Blog Posts → Database

# Runs whenever markdown files are added or changed in blog/
on:
  push:
    branches: [main]
    paths:
      - "blog/**.md"
      - "scripts/sync-blog.ts"
      - ".github/workflows/sync-blog.yml"

  # Manual trigger for one-off backfills
  workflow_dispatch:

jobs:
  sync:
    name: Upsert blog/ markdown into Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync markdown → database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm tsx scripts/sync-blog.ts
