name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Revalidate
        run: pnpm revalidate

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Non-blocking until the dev-server boot env (DATABASE_URL, SUPABASE_*)
    # is wired into this job. Playwright's webServer (`npm run dev`) needs
    # those to start the API; without them the suite cannot meaningfully
    # run. Tracked as a follow-up — see PR #72.
    continue-on-error: true
    env:
      PORT: "3000"
      E2E_SUBSCRIBER_EMAIL: ${{ secrets.E2E_SUBSCRIBER_EMAIL }}
      E2E_SUBSCRIBER_PASSWORD: ${{ secrets.E2E_SUBSCRIBER_PASSWORD }}
      E2E_ATTORNEY_EMAIL: ${{ secrets.E2E_ATTORNEY_EMAIL }}
      E2E_ATTORNEY_PASSWORD: ${{ secrets.E2E_ATTORNEY_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify E2E credentials are configured
        run: |
          missing=0
          for var in E2E_SUBSCRIBER_EMAIL E2E_SUBSCRIBER_PASSWORD E2E_ATTORNEY_EMAIL E2E_ATTORNEY_PASSWORD E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::warning::Missing secret: $var — authenticated E2E tests will be skipped"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::warning::Some E2E secrets are missing. Configure them in repository settings for full coverage."
          fi

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
