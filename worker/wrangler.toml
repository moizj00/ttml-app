name = "ttml-affiliate-tracker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
MAIN_SITE_URL = "https://www.talk-to-my-lawyer.com"

[[kv_namespaces]]
binding = "AFFILIATE_CLICKS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_NAMESPACE_PREVIEW_ID"

# Secrets (set via: wrangler secret put ANALYTICS_SECRET)
# ANALYTICS_SECRET — shared secret for the /analytics endpoint

# Custom domain: Configure in Cloudflare dashboard
# Route: refer.talktomylawyer.com/* → ttml-affiliate-tracker
